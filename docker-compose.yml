services:
  mongodb:
    image: mongo:7
    container_name: routy-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: routy-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MONGO_URI=mongodb://mongodb:27017/routy
      - DUFFEL_TOKEN=${DUFFEL_TOKEN}
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: routy-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8080
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
