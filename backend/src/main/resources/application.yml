spring:
  application:
    name: route-aggregator
  profiles:
    active: dev
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/rotepet}

jwt:
  secret: ${JWT_SECRET:cGxlYXNlLXJlcGxhY2UtdGhpcy1zZWNyZXQtaW4tcHJvZHVjdGlvbi1lbnZpcm9ubWVudA==}
  expiration-ms: 86400000

server:
  port: 8080

providers:
  duffel:
    base-url: https://api.duffel.com
    token: ${DUFFEL_TOKEN}
  transitous:
    base-url: https://api.transitous.org

cors:
  allowed-origins: "http://localhost:5173"

logging:
  level:
    com.rotepet: INFO
    org.springframework.web: INFO

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.rotepet: DEBUG
    org.springframework.web: INFO

---
spring:
  config:
    activate:
      on-profile: docker

logging:
  level:
    com.rotepet: INFO
